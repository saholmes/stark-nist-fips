    const AIR_TYPES = ["fib_w2_d2", "poseidon_w16_d2", "regmach_w8_d2"];

      "fib_w2_d2": "Fibonacci (w=2)",

    const METRICS = [
      { key: "proof_kb",   label: "Proof size (KB)",     icon: IconHardDrive, unit: "KB", log: false },
      { key: "prove_s",    label: "Prove time (s)",      icon: IconClock,     unit: "s",  log: true  },
      { key: "verify_ms",  label: "Verify time (ms)",    icon: IconZap,       unit: "ms", log: true  },
      { key: "throughput", label: "Throughput (elems/s)",icon: IconActivity,  unit: "/s", log: false },
    ];

    function rowsAsObjects(rows) {
      return rows.map(([air, k, pb, ps, vm, tp]) => ({
        air_type: air, k,
        proof_bytes: pb,
        proof_kb: +(pb / 1024).toFixed(1),
        prove_s: ps,
        verify_ms: vm,
        throughput: tp,
      }));
    }

    function Dashboard() {
      const [mode, setMode] = useState("single");
      const [activeConfig, setActiveConfig] = useState(CONFIG_KEYS[0]);
      const [activeAir, setActiveAir] = useState("poseidon_w16_d2");
      const [activeMetric, setActiveMetric] = useState("prove_s");
      const [logY, setLogY] = useState(true);
      const [selectedConfigs, setSelectedConfigs] = useState(new Set(CONFIG_KEYS));

      const singleData = useMemo(() => {
        const rows = rowsAsObjects(DATA[activeConfig].rows);
        const byK = {};
        rows.forEach(r => {
          byK[r.k] = byK[r.k] || { k: r.k };
          byK[r.k][r.air_type] = r[activeMetric];
        });
        return Object.values(byK).sort((a, b) => a.k - b.k);
      }, [activeConfig, activeMetric]);

      const compareData = useMemo(() => {
        const byK = {};
        CONFIG_KEYS.forEach(cfg => {
          if (!selectedConfigs.has(cfg)) return;
          rowsAsObjects(DATA[cfg].rows)
            .filter(r => r.air_type === activeAir)
            .forEach(r => {
              byK[r.k] = byK[r.k] || { k: r.k };
              byK[r.k][cfg] = r[activeMetric];
            });
        });
        return Object.values(byK).sort((a, b) => a.k - b.k);
      }, [activeAir, activeMetric, selectedConfigs]);

      const metricMeta = METRICS.find(m => m.key === activeMetric);
      const AIR_COLORS = {
        "fib_w2_d2": "#2563eb",
        "poseidon_w16_d2": "#dc2626",
        "regmach_w8_d2": "#16a34a",
      };

      const formatVal = (v) => {
        if (v === null || v === undefined) return "-";
        if (activeMetric === "throughput") return (v / 1000).toFixed(1) + "k";
        if (activeMetric === "proof_kb")   return v.toFixed(1);
        if (activeMetric === "verify_ms")  return v.toFixed(1);
        if (activeMetric === "prove_s")    return v < 1 ? v.toFixed(3) : v.toFixed(2);
        return v;
      };

      const downloadCSV = () => {
        const data = mode === "single" ? singleData : compareData;
        if (!data.length) return;
        const keys = Object.keys(data[0]);
        const csv = [keys.join(","), ...data.map(r => keys.map(k => r[k] ?? "").join(","))].join("\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `benchmark_${mode}_${activeMetric}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="min-h-screen bg-slate-50 p-4 sm:p-6">
          <div className="max-w-7xl mx-auto">
            <div className="mb-6">
              <h1 className="text-2xl sm:text-3xl font-bold text-slate-900 flex items-center gap-2">
                <IconBarChart className="w-7 h-7 text-indigo-600" />
                DEEP-ALI STARK Benchmark Dashboard
              </h1>
              <p className="text-sm text-slate-600 mt-1">
                Interactive results across NIST L1/L3/L5 security levels with quantum adversary capacity· binary-tree FRI · multi-AIR
              </p>
            </div>

            <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-4 mb-4">
              <div className="flex flex-wrap gap-2 mb-4">
                <button onClick={() => setMode("single")}
                  className={`px-4 py-2 rounded-md text-sm font-medium transition ${mode === "single" ? "bg-indigo-600 text-white" : "bg-slate-100 text-slate-700 hover:bg-slate-200"}`}>
                  <IconLine className="inline w-4 h-4 mr-1" />
                  AIR comparison (fix config)
                </button>
                <button onClick={() => setMode("compare")}
                  className={`px-4 py-2 rounded-md text-sm font-medium transition ${mode === "compare" ? "bg-indigo-600 text-white" : "bg-slate-100 text-slate-700 hover:bg-slate-200"}`}>
                  <IconBarChart className="inline w-4 h-4 mr-1" />
                  Config comparison (fix AIR)
                </button>
                <button onClick={downloadCSV}
                  className="ml-auto px-4 py-2 rounded-md text-sm font-medium bg-emerald-600 text-white hover:bg-emerald-700 transition">
                  <IconDownload className="inline w-4 h-4 mr-1" />
                  Export CSV
                </button>
              </div>

              {mode === "single" ? (
                <div>
                  <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">
                    Configuration
                  </label>
                  <div className="flex flex-wrap gap-2">
                    {CONFIG_KEYS.map(cfg => (
                      <button key={cfg} onClick={() => setActiveConfig(cfg)}
                        className={`px-3 py-1.5 rounded-md text-xs font-medium border transition ${activeConfig === cfg ? "border-indigo-600 bg-indigo-50 text-indigo-700" : "border-slate-200 bg-white text-slate-700 hover:border-slate-300"}`}>
                        {DATA[cfg].label}
                      </button>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="space-y-3">
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">AIR type</label>
                    <div className="flex flex-wrap gap-2">
                      {AIR_TYPES.map(a => (
                        <button key={a} onClick={() => setActiveAir(a)}
                          className={`px-3 py-1.5 rounded-md text-xs font-medium border transition ${activeAir === a ? "border-indigo-600 bg-indigo-50 text-indigo-700" : "border-slate-200 bg-white text-slate-700 hover:border-slate-300"}`}>
                          {AIR_LABEL[a]}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">
                      Configurations to compare
                    </label>
                    <div className="flex flex-wrap gap-2">
                      {CONFIG_KEYS.map(cfg => {
                        const on = selectedConfigs.has(cfg);
                        return (
                          <button key={cfg}
                            onClick={() => {
                              const next = new Set(selectedConfigs);
                              if (on) next.delete(cfg); else next.add(cfg);
                              setSelectedConfigs(next);
                            }}
                            className="px-3 py-1.5 rounded-md text-xs font-medium border transition"
                            style={{
                              borderColor: on ? DATA[cfg].color : "#e2e8f0",
                              backgroundColor: on ? DATA[cfg].color + "15" : "white",
                              color: on ? DATA[cfg].color : "#475569",
                            }}>
                            {DATA[cfg].label}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              )}
            </div>

            <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-4 mb-4">
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Metric</label>
              <div className="flex flex-wrap gap-2 items-center">
                {METRICS.map(m => {
                  const IconC = m.icon;
                  return (
                    <button key={m.key}
                      onClick={() => { setActiveMetric(m.key); setLogY(m.log); }}
                      className={`px-3 py-1.5 rounded-md text-xs font-medium border transition flex items-center gap-1.5 ${activeMetric === m.key ? "border-indigo-600 bg-indigo-50 text-indigo-700" : "border-slate-200 bg-white text-slate-700 hover:border-slate-300"}`}>
                      <IconC className="w-3.5 h-3.5" />
                      {m.label}
                    </button>
                  );
                })}
                <label className="ml-auto flex items-center gap-2 text-xs text-slate-600 cursor-pointer">
                  <input type="checkbox" checked={logY} onChange={e => setLogY(e.target.checked)} className="rounded" />
                  Log Y-axis
                </label>
              </div>
            </div>

            <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-4 mb-4">
              <h2 className="text-sm font-semibold text-slate-800 mb-3">
                {metricMeta.label} vs. trace size 2<sup>k</sup>
                <span className="ml-2 text-xs font-normal text-slate-500">
                  {mode === "single" ? DATA[activeConfig].label : `AIR = ${AIR_LABEL[activeAir]}`}
                </span>
              </h2>
              <div className="w-full h-96">
                <ResponsiveContainer width="100%" height="100%">
                  <LineChart data={mode === "single" ? singleData : compareData} margin={{ top: 10, right: 20, left: 0, bottom: 10 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                    <XAxis dataKey="k"
                      label={{ value: "log2(trace rows) k", position: "insideBottom", offset: -5, fontSize: 12 }}
                      tick={{ fontSize: 12 }} />
                    <YAxis
                      scale={logY ? "log" : "linear"}
                      domain={logY ? ["auto", "auto"] : [0, "auto"]}
                      allowDataOverflow
                      tick={{ fontSize: 12 }}
                      tickFormatter={formatVal}
                      label={{ value: metricMeta.unit, angle: -90, position: "insideLeft", fontSize: 12 }} />
                    <Tooltip
                      formatter={(v, name) => [formatVal(v) + " " + metricMeta.unit, mode === "single" ? AIR_LABEL[name] : (DATA[name] && DATA[name].label) || name]}
                      labelFormatter={(l) => `k = ${l} (trace = 2^${l})`}
                      contentStyle={{ fontSize: 12, borderRadius: 6 }} />
                    <Legend
                      formatter={(v) => mode === "single" ? AIR_LABEL[v] : (DATA[v] && DATA[v].label) || v}
                      wrapperStyle={{ fontSize: 12 }} />
                    {mode === "single"
                      ? AIR_TYPES.map(a => (
                          <Line key={a} type="monotone" dataKey={a} stroke={AIR_COLORS[a]} strokeWidth={2} dot={{ r: 3 }} activeDot={{ r: 6 }} />
                        ))
                      : CONFIG_KEYS.filter(c => selectedConfigs.has(c)).map(cfg => (
                          <Line key={cfg} type="monotone" dataKey={cfg} stroke={DATA[cfg].color} strokeWidth={2} dot={{ r: 3 }} activeDot={{ r: 6 }} />
                        ))
                    }
                  </LineChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-4 mb-4">
              <h2 className="text-sm font-semibold text-slate-800 mb-3">
                Proof size at k=24 across configurations (KB)
                <span className="ml-2 text-xs font-normal text-slate-500">AIR = Poseidon (w=16)</span>
              </h2>
              <div className="w-full h-72">
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart
                    data={CONFIG_KEYS.map(cfg => {
                      const row = DATA[cfg].rows.find(r => r[0] === "poseidon_w16_d2" && r[1] === 24);
                      return { name: DATA[cfg].label.replace(/NIST /, ""), size: +(row[2] / 1024).toFixed(1), color: DATA[cfg].color };
                    })}
                    margin={{ top: 10, right: 20, left: 0, bottom: 80 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                    <XAxis dataKey="name" tick={{ fontSize: 10 }} angle={-25} textAnchor="end" interval={0} />
                    <YAxis tick={{ fontSize: 12 }} label={{ value: "KB", angle: -90, position: "insideLeft", fontSize: 12 }} />
                    <Tooltip contentStyle={{ fontSize: 12, borderRadius: 6 }} formatter={(v) => [v + " KB", "Proof size"]} />
                    <Bar dataKey="size" fill="#6366f1" radius={[4, 4, 0, 0]} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-4">
              <h2 className="text-sm font-semibold text-slate-800 mb-3">Headline numbers at k=24</h2>
              <div className="overflow-x-auto">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="border-b border-slate-200 text-slate-600">
                      <th className="text-left py-2 px-2 font-semibold">Configuration</th>
                      <th className="text-right py-2 px-2 font-semibold">Proof (KB)</th>
                      <th className="text-right py-2 px-2 font-semibold">Prove (s)</th>
                      <th className="text-right py-2 px-2 font-semibold">Verify (ms)</th>
                      <th className="text-right py-2 px-2 font-semibold">Throughput (k/s)</th>
                    </tr>
                  </thead>
                  <tbody>
                    {CONFIG_KEYS.map(cfg => {
                      const row = DATA[cfg].rows.find(r => r[0] === "poseidon_w16_d2" && r[1] === 24);
                      return (
                        <tr key={cfg} className="border-b border-slate-100 hover:bg-slate-50">
                          <td className="py-2 px-2">
                            <span className="inline-block w-2 h-2 rounded-full mr-2" style={{ backgroundColor: DATA[cfg].color }}></span>
                            {DATA[cfg].label}
                          </td>
                          <td className="text-right py-2 px-2 font-mono">{(row[2] / 1024).toFixed(1)}</td>
                          <td className="text-right py-2 px-2 font-mono">{row[3].toFixed(2)}</td>
                          <td className="text-right py-2 px-2 font-mono">{row[4].toFixed(1)}</td>
                          <td className="text-right py-2 px-2 font-mono">{(row[5] / 1000).toFixed(1)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <p className="text-xs text-slate-500 mt-3">
                Poseidon (w=16) AIR · k=24 (2²⁴ trace rows) · schedule tail = 256
              </p>
            </div>

            <p className="text-xs text-slate-400 mt-6 text-center">
              Data from <code>Final-NIST-*-binaryarity-*-benchmarkdata.csv</code> · hover points for exact values · toggle log/linear Y-axis above
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
